<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-label="Lamplight — the night-shift memory that never clocks out, and forgets on schedule">
  <defs>
    <radialGradient id="lbgA" cx="72%" cy="14%" r="55%">
      <stop offset="0" stop-color="#F4B860" stop-opacity=".15"/><stop offset="1" stop-color="#F4B860" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lbgB" cx="8%" cy="92%" r="50%">
      <stop offset="0" stop-color="#2DD4BF" stop-opacity=".07"/><stop offset="1" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lbrand" gradientUnits="userSpaceOnUse" x1="60" y1="0" x2="960" y2="0">
      <stop offset="0" stop-color="#F6F1E7"/><stop offset=".55" stop-color="#F4B860"/><stop offset="1" stop-color="#2DD4BF"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-260 0;260 0;-260 0" dur="7s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="lblur14" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="14"/></filter>
    <filter id="lblur3"><feGaussianBlur stdDeviation="3"/></filter>
    <pattern id="lgrid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#F6F1E7" stroke-opacity=".05" stroke-width="1"/>
    </pattern>
    <style>
      .disp { font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
      .mono { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
    </style>
  </defs>

  <rect width="1280" height="640" fill="#101418"/>
  <rect width="1280" height="640" fill="url(#lbgA)"><animate attributeName="opacity" values=".7;1;.7" dur="5s" repeatCount="indefinite"/></rect>
  <rect width="1280" height="640" fill="url(#lbgB)"/>
  <g><rect x="-48" y="-48" width="1376" height="736" fill="url(#lgrid)"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="48 48" dur="5s" repeatCount="indefinite"/></g>

  <!-- fireflies -->
  <g fill="#F4B860">
    <circle cx="1060" cy="300" r="3"><animate attributeName="opacity" values="0;.9;0" dur="3.2s" repeatCount="indefinite"/><animate attributeName="cy" values="300;284;300" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="520" r="2.4"><animate attributeName="opacity" values="0;.7;0" dur="4.1s" begin="1.2s" repeatCount="indefinite"/><animate attributeName="cx" values="700;716;700" dur="4.1s" begin="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="380" cy="90" r="2.6"><animate attributeName="opacity" values="0;.8;0" dur="3.7s" begin=".6s" repeatCount="indefinite"/><animate attributeName="cy" values="90;76;90" dur="3.7s" begin=".6s" repeatCount="indefinite"/></circle>
    <circle cx="1180" cy="480" r="2.2"><animate attributeName="opacity" values="0;.6;0" dur="4.6s" begin="2s" repeatCount="indefinite"/><animate attributeName="cx" values="1180;1166;1180" dur="4.6s" begin="2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- MEMORY TIMELINE PANEL: 15 shifts, the thread lights up, resolved item strikes through -->
  <g>
    <rect x="620" y="96" width="596" height="168" rx="14" fill="#191F26" stroke="#F6F1E7" stroke-opacity=".1"/>
    <text x="636" y="86" class="mono" font-size="13" letter-spacing="2" fill="#9AA29C">BED 9 · 15 SHIFTS · THE CEFAZOLIN THREAD</text>
    <!-- shift dots -->
    <g fill="#9AA29C" opacity=".5">
      <circle cx="656" cy="150" r="5"/><circle cx="694" cy="150" r="5"/><circle cx="732" cy="150" r="5"/><circle cx="770" cy="150" r="5"/><circle cx="808" cy="150" r="5"/><circle cx="846" cy="150" r="5"/><circle cx="884" cy="150" r="5"/><circle cx="922" cy="150" r="5"/><circle cx="960" cy="150" r="5"/><circle cx="998" cy="150" r="5"/><circle cx="1036" cy="150" r="5"/><circle cx="1074" cy="150" r="5"/><circle cx="1112" cy="150" r="5"/><circle cx="1150" cy="150" r="5"/><circle cx="1188" cy="150" r="5"/>
    </g>
    <!-- thread nodes light in sequence: shift 4 (med start), 6 (rash), 12 (rash again) -->
    <path d="M770 150 C 810 118 846 118 846 150 C 846 118 1074 110 1074 150" fill="none" stroke="#F4B860" stroke-width="2.5" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100">
      <animate attributeName="stroke-dashoffset" values="100;0;0" keyTimes="0;.5;1" dur="6s" repeatCount="indefinite"/>
    </path>
    <circle cx="770" cy="150" r="8" fill="#F4B860"><animate attributeName="opacity" values=".3;1;1;.3" keyTimes="0;.15;.9;1" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="846" cy="150" r="8" fill="#F4B860"><animate attributeName="opacity" values=".3;.3;1;1;.3" keyTimes="0;.25;.4;.9;1" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="1074" cy="150" r="8" fill="#F87171"><animate attributeName="r" values="8;11;8" dur="1.2s" repeatCount="indefinite"/></circle>
    <g class="mono" font-size="12" fill="#9AA29C">
      <text x="758" y="132" text-anchor="middle">med start</text>
      <text x="846" y="180" text-anchor="middle">rash 4h</text>
      <text x="1086" y="132" text-anchor="middle" fill="#F87171">flag ⚠</text>
    </g>
    <!-- brief line appears -->
    <g opacity="0"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;.5;.62;.95;1" dur="6s" repeatCount="indefinite"/>
      <rect x="644" y="204" width="418" height="30" rx="15" fill="none" stroke="#F4B860" stroke-opacity=".7"/>
      <text x="660" y="224" class="mono" font-size="13" fill="#F4B860">BRIEF: rash began 4h after cefazolin → verify allergy</text>
      <text x="1076" y="224" class="mono" font-size="12" fill="#9AA29C">[ep-041]</text>
    </g>
    <!-- forgotten item strikes through -->
    <g class="mono" font-size="13">
      <text x="644" y="252" fill="#9AA29C" opacity=".55">IV site check — resolved shift 2</text>
      <line x1="644" y1="248" x2="903" y2="248" stroke="#9AA29C" stroke-width="2" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100">
        <animate attributeName="stroke-dashoffset" values="100;100;0;0" keyTimes="0;.62;.75;1" dur="6s" repeatCount="indefinite"/>
      </line>
      <text x="917" y="252" fill="#2DD4BF" opacity="0">forgotten ✓<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;.72;.8;.95;1" dur="6s" repeatCount="indefinite"/></text>
    </g>
  </g>

  <!-- kicker -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur=".6s" begin=".1s" fill="freeze"/>
    <text x="64" y="92" class="mono" font-size="15" letter-spacing="4" fill="#2DD4BF">QWEN CLOUD // TRACK 1 · MEMORYAGENT</text>
  </g>

  <!-- title -->
  <g opacity="0" transform="translate(0 26)">
    <animate attributeName="opacity" from="0" to="1" dur=".9s" begin=".25s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="0 26;0 0" dur=".9s" begin=".25s" fill="freeze" calcMode="spline" keySplines=".22 1 .36 1" keyTimes="0;1"/>
    <text x="58" y="210" class="disp" font-size="112" font-weight="800" letter-spacing="-3" fill="#F4B860" filter="url(#lblur14)" opacity=".5">Lamplight<animate attributeName="opacity" values=".3;.65;.3" dur="3.4s" repeatCount="indefinite"/></text>
    <text x="58" y="210" class="disp" font-size="112" font-weight="800" letter-spacing="-3" fill="url(#lbrand)">Lamplight</text>
  </g>

  <!-- tagline -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur=".8s" begin=".55s" fill="freeze"/>
    <text x="64" y="262" class="disp" font-size="24" fill="#9AA29C">The night-shift memory that never clocks out —</text>
    <text x="64" y="296" class="disp" font-size="24" fill="#9AA29C">and <tspan fill="#F6F1E7" font-weight="600">forgets on schedule.</tspan> Every brief cites its source.</text>
  </g>

  <!-- metric -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur=".8s" begin=".85s" fill="freeze"/>
    <text x="62" y="386" class="disp" font-size="72" font-weight="800" fill="#F4B860" filter="url(#lblur3)" opacity=".55">0.99<animate attributeName="opacity" values=".35;.75;.35" dur="2.6s" repeatCount="indefinite"/></text>
    <text x="62" y="386" class="disp" font-size="72" font-weight="800" fill="#F6F1E7">0.99 <tspan fill="#9AA29C" font-size="44">vs</tspan> 0.85</text>
    <text x="442" y="360" class="mono" font-size="16" fill="#9AA29C">mean critical recall@5 vs naive RAG</text>
    <text x="442" y="384" class="mono" font-size="16" fill="#2DD4BF">0 stale · RAG 151</text>
  </g>

  <!-- features -->
  <g class="disp" font-size="18" fill="#F6F1E7" opacity="0"><animate attributeName="opacity" from="0" to="1" dur=".8s" begin="1.1s" fill="freeze"/>
    <text x="64" y="446"><tspan fill="#F4B860">◆</tspan>  Decay classes: critical never fades, routine retires</text>
    <text x="64" y="480"><tspan fill="#F4B860">◆</tspan>  2,000-token briefs — knapsack-packed, citation-gated</text>
    <text x="64" y="514"><tspan fill="#F4B860">◆</tspan>  Signed memory ledger: who knew what, when</text>
  </g>

  <!-- memory pipeline diagram -->
  <g>
    <path d="M632 400 H1216" stroke="#F4B860" stroke-opacity=".28" stroke-width="2" stroke-dasharray="8 7" fill="none">
      <animate attributeName="stroke-dashoffset" values="0;-30" dur="1.1s" repeatCount="indefinite"/>
    </path>
    <circle r="5" fill="#F4B860" filter="url(#lblur3)"><animateMotion dur="2.6s" repeatCount="indefinite" path="M632 400 H1216"/></circle>
    <g class="mono" font-size="14" text-anchor="middle">
      <rect x="620" y="374" width="128" height="52" rx="12" fill="#191F26" stroke="#2DD4BF" stroke-opacity=".6"/>
      <text x="684" y="405" fill="#2DD4BF">15 SHIFTS</text>
      <rect x="772" y="374" width="110" height="52" rx="12" fill="#191F26" stroke="#F6F1E7" stroke-opacity=".22"/>
      <text x="827" y="405" fill="#F6F1E7">DECAY</text>
      <rect x="906" y="374" width="160" height="52" rx="12" fill="#191F26" stroke="#F4B860" stroke-opacity=".8"><animate attributeName="stroke-opacity" values=".5;1;.5" dur="2s" repeatCount="indefinite"/></rect>
      <text x="986" y="405" fill="#F4B860">PACK 2K TOK</text>
      <rect x="1090" y="374" width="126" height="52" rx="12" fill="#191F26" stroke="#F4B860"/>
      <text x="1153" y="405" fill="#F6F1E7">BRIEF ✓</text>
    </g>
    <g class="mono" font-size="13">
      <rect x="964" y="330" width="252" height="30" rx="15" fill="none" stroke="#9AA29C" stroke-opacity=".4" stroke-dasharray="5 5"/>
      <circle cx="984" cy="345" r="4" fill="#34D399"><animate attributeName="opacity" values="1;.3;1" dur="1.6s" repeatCount="indefinite"/></circle>
      <text x="1000" y="350" fill="#9AA29C">confirm / contradict / pin</text>
    </g>
  </g>

  <!-- pills -->
  <g class="mono" font-size="13" opacity="0"><animate attributeName="opacity" from="0" to="1" dur=".8s" begin="1.35s" fill="freeze"/>
    <rect x="64" y="574" width="141" height="30" rx="15" fill="#191F26" stroke="#F6F1E7" stroke-opacity=".14"/><circle cx="82" cy="589" r="3.5" fill="#F4B860"/><text x="94" y="594" fill="#9AA29C">qwen3.7-plus</text>
    <rect x="217" y="574" width="181" height="30" rx="15" fill="#191F26" stroke="#F6F1E7" stroke-opacity=".14"/><circle cx="235" cy="589" r="3.5" fill="#F4B860"/><text x="247" y="594" fill="#9AA29C">text-embedding-v4</text>
    <rect x="410" y="574" width="141" height="30" rx="15" fill="#191F26" stroke="#F6F1E7" stroke-opacity=".14"/><circle cx="428" cy="589" r="3.5" fill="#F4B860"/><text x="440" y="594" fill="#9AA29C">qwen3-rerank</text>
    <rect x="563" y="574" width="101" height="30" rx="15" fill="#191F26" stroke="#F6F1E7" stroke-opacity=".14"/><circle cx="581" cy="589" r="3.5" fill="#F4B860"/><text x="593" y="594" fill="#9AA29C">fun-asr</text>
    <rect x="676" y="574" width="117" height="30" rx="15" fill="#191F26" stroke="#F6F1E7" stroke-opacity=".14"/><circle cx="694" cy="589" r="3.5" fill="#F4B860"/><text x="706" y="594" fill="#9AA29C">Batch API</text>
    <rect x="805" y="574" width="125" height="30" rx="15" fill="#191F26" stroke="#F6F1E7" stroke-opacity=".14"/><circle cx="823" cy="589" r="3.5" fill="#F4B860"/><text x="835" y="594" fill="#9AA29C">Alibaba FC</text>
    <g text-anchor="end"><text x="1216" y="594" fill="#9AA29C" opacity=".8">90 SECONDS PER PATIENT · CITED</text></g>
  </g>

  <!-- sweep -->
  <rect x="-160" y="0" width="120" height="640" fill="#F6F1E7" opacity=".04" transform="skewX(-12)">
    <animate attributeName="x" values="-200;1400" dur="6s" repeatCount="indefinite"/>
  </rect>
</svg>
