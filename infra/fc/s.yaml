# Serverless Devs (s.yaml) — Lamplight on Alibaba Function Compute 3.0.
#
# MANAGED python3.10 runtime (no container / no ACR / no real-name verification).
# Lamplight targets 3.12 and uses enum.StrEnum (3.11+); infra/fc/wsgi.py shims it
# before importing the package, so the app runs unchanged on the 3.10 runtime.
#
#   s build --use-docker   # installs requirements.txt into ./python
#   s deploy               # zips code + creates the fn + HTTP trigger
#
# Endpoints (anonymous HTTP trigger — offline / zero-key / zero-network):
#   GET /verify   socket-guarded byte-identical replay + signed op-chain verify
#   GET /run      one deterministic offline handover brief
#   GET /health   liveness

edition: 3.0.0
name: lamplight-fc
access: default

vars:
  region: ap-southeast-1

resources:
  lamplight:
    component: fc3
    props:
      region: ${vars.region}
      functionName: lamplight
      description: "Lamplight — cross-shift handover memory engine (Qwen Cloud, SYNTHETIC DATA ONLY)"
      runtime: python3.10
      handler: infra.fc.wsgi.handler
      cpu: 0.35
      memorySize: 512
      diskSize: 512
      timeout: 60
      instanceConcurrency: 5
      # code root = the build dir (this file lives in infra/fc/).
      code: ../../
      environmentVariables:
        # s build installs requirements.txt deps under /code/python
        PYTHONPATH: /code/python
      triggers:
        - triggerName: http
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
